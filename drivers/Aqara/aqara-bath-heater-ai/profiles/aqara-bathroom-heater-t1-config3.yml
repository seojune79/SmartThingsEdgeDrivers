name: aqara-bathroom-heater-t1-config3
components:
  - id: main
    label: "욕실 난방/환풍"
    capabilities:
      - id: switch
      - id: switchLevel
      - id: colorTemperature
        config:
          values:
            - key: "colorTemperature.value"
              range: [2700, 6500]
      - id: thermostatMode
        config:
          values:
            - key: "thermostatMode.value"
              enabledValues:
                - "off"
                - "heat"
                - "dryair"
                - "cool"
                - "fanonly"
      - id: thermostatHeatingSetpoint
        config:
          values:
            - key: "thermostatHeatingSetpoint.value"
              range: [16, 45]
              unit: "C"
      - id: fanOscillationMode
        config:
          values:
            - key: "fanOscillationMode.value"
              enabledValues:
                - "swing"
                - "fixed"
      - id: fanSpeed
        config:
          values:
            - key: "fanSpeed.value"
              range: [1, 3]
    categories:
      - name: Thermostat
deviceConfig:
  dashboard:
    states:
      - component: main
        capability: switch
        version: 1
    actions:
    - component: main
      capability: switch
      version: 1
  detailView:
  - component: main
    capability: switch
    version: 1
  - component: main
    capability: switchLevel
    version: 1
  - component: main
    capability: colorTemperature
    version: 1
  - component: main
    capability: thermostatMode
    version: 1
  - component: main
    capability: thermostatHeatingSetpoint
    version: 1
    visibleCondition:
      component: main
      capability: thermostatMode
      version: 1
      value: thermostatMode.value
      operator: EQUALS
      operand: "heat"
  - component: main
    capability: fanOscillationMode
    version: 1
    visibleCondition:
      component: main
      capability: thermostatMode
      version: 1
      value: thermostatMode.value
      operator: ONE_OF
      operand: '["heat", "dryair", "cool"]'
  - component: main
    capability: fanSpeed
    version: 1
    visibleCondition:
      component: main
      capability: thermostatMode
      version: 1
      value: thermostatMode.value
      operator: ONE_OF
      operand: '["heat", "dryair", "cool", "fanonly"]'
  automation:
    conditions:
    - component: main
      capability: switch
      version: 1
    - component: main
      capability: switchLevel
      version: 1
    - component: main
      capability: colorTemperature
      version: 1
    - component: main
      capability: thermostatMode
      version: 1
    - component: main
      capability: thermostatHeatingSetpoint
      version: 1
    - component: main
      capability: fanOscillationMode
      version: 1
    - component: main
      capability: fanSpeed
      version: 1
    actions:
    - component: main
      capability: switch
      version: 1
    - component: main
      capability: switchLevel
      version: 1
    - component: main
      capability: colorTemperature
      version: 1
    - component: main
      capability: thermostatMode
      version: 1
    - component: main
      capability: thermostatHeatingSetpoint
      version: 1
    - component: main
      capability: fanOscillationMode
      version: 1
    - component: main
      capability: fanSpeed
      version: 1

