name: aqara-bath-heater
components:
  - id: main
    label: "욕실 난방/환풍"
    capabilities:
      - id: switch
      - id: switchLevel
      - id: colorTemperature
        config:
          values:
            - key: "colorTemperature.value"
              range: [2700, 6500]
      - id: thermostatMode
        config:
          values:
            - key: "thermostatMode.value"
              enabledValues:
                - "off"
                - "heat"
                - "dryair"
                - "cool"
                - "fanonly"
      - id: thermostatHeatingSetpoint
        config:
          values:
            - key: "thermostatHeatingSetpoint.value"
              range: [16, 45]
              unit: "C"
      - id: fanOscillationMode
        config:
          values:
            - key: "fanOscillationMode.value"
              enabledValues:
                - "swing"
                - "fixed"
      - id: fanSpeed
        config:
          values:
            - key: "fanSpeed.value"
              range: [1, 3]
              step: 1
    categories:
      - name: Thermostat
deviceConfig:
  dashboard:
    states:
      - component: main
        capability: switch
        version: 1
      - component: main
        capability: fanSpeed
        version: 1
        values:
        - key: "fanSpeed.value"
          range: [1, 3]
          step: 1
    actions:
    - component: main
      capability: switch
      version: 1
  detailView:
  - component: main
    capability: switch
    version: 1
  - component: main
    capability: switchLevel
    version: 1
  - component: main
    capability: colorTemperature
    version: 1
  - component: main
    capability: thermostatMode
    version: 1
  - component: main
    capability: thermostatHeatingSetpoint
    version: 1
    visibleCondition:
      component: main
      capability: thermostatMode
      version: 1
      value: thermostatMode.value
      operator: EQUALS
      operand: "heat"
  - component: main
    capability: fanOscillationMode
    version: 1
    visibleCondition:
      component: main
      capability: thermostatMode
      version: 1
      value: thermostatMode.value
      operator: ONE_OF
      operand: '["heat", "dryair", "cool"]'
  - component: main
    capability: fanSpeed
    version: 1
    values:
      - key: "fanSpeed.value"
        range: [1, 3]
        step: 1
    visibleCondition:
      component: main
      capability: thermostatMode
      version: 1
      value: thermostatMode.value
      operator: ONE_OF
      operand: '["heat", "dryair", "cool", "fanonly"]'
  automation:
    conditions:
    - component: main
      capability: switch
      version: 1
    - component: main
      capability: switchLevel
      version: 1
    - component: main
      capability: colorTemperature
      version: 1
    - component: main
      capability: thermostatMode
      version: 1
    - component: main
      capability: thermostatHeatingSetpoint
      version: 1
    - component: main
      capability: fanOscillationMode
      version: 1
    - component: main
      capability: fanSpeed
      version: 1
      values:
        - key: fanSpeed.value
          range: [1, 3]
          step: 1
    actions:
    - component: main
      capability: switch
      version: 1
    - component: main
      capability: switchLevel
      version: 1
    - component: main
      capability: colorTemperature
      version: 1
    - component: main
      capability: thermostatMode
      version: 1
    - component: main
      capability: thermostatHeatingSetpoint
      version: 1
    - component: main
      capability: fanOscillationMode
      version: 1
    - component: main
      capability: fanSpeed
      version: 1
      values:
        - key: setFanSpeed.speed
          range: [1, 3]
          step: 1

preferences:
  # ── 야간 조명 모드 (0x0518, Uint32) ──────────────────────
  # bits23-12: 시작시간(분), bits11-0: 종료시간(분×2)
  # OFF = 현재값 + 1
  - title: "야간 조명 모드"
    description: "설정된 시간에 조명을 켜면 가장 어둡고 낮은 색온도로 전환합니다."
    name: nightLightMode
    required: false
    preferenceType: boolean
    definition:
      id: nightLightMode
      default: false

  - title: "야간 조명 모드 시작 시간(0~23시)"
    name: nightLightStartHour
    required: false
    preferenceType: integer
    definition:
      minimum: 0
      maximum: 23
      default: 21

  - title: "야간 조명 모드 종료 시간(다음 날 0~23시)"
    name: nightLightEndHour
    required: false
    preferenceType: integer
    definition:
      minimum: 0
      maximum: 23
      default: 9

  # ── 동작 비프음 소거 (0x0256/0x0257) ─────────────────────
  - title: "동작 비프음 소거"
    description: "동작 비프음이 소거 됩니다."
    name: muteBeep
    required: false
    preferenceType: boolean
    definition:
      id: muteBeep
      default: false

  # ── 항온 모드 (0x02BE) ────────────────────────────────────
  - title: "항온 모드"
    description: "목표 온도에 도달하면 자동 제어를 통해 일정한 온도를 유지합니다."
    name: thermostatCtrl
    required: false
    preferenceType: boolean
    definition:
      id: thermostatCtrl
      default: true
