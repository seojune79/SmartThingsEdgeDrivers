name: bathheater
components:
  - id: main
    capabilities:
      - id: thermostatMode
        version: 1
      - id: thermostatHeatingSetpoint
        version: 1
        config:
          values:
            - key: "heatingSetpoint.value"
              range: [16, 45]
      - id: fanSpeed
        version: 1
        config:
          values:
            - key: "fanSpeed.value"
              range: [1, 3]
      - id: fanOscillationMode
        version: 1
      - id: firmwareUpdate
        version: 1
      - id: refresh
        version: 1
    categories:
      - name: Fan
  - id: light
    capabilities:
      - id: switch
        version: 1
      - id: switchLevel
        version: 1
        config:
          values:
            - key: "level.value"
              range: [0, 100]
      - id: colorTemperature
        version: 1
        config:
          values:
            - key: "colorTemperature.value"
              range: [ 2700, 6500 ]
    categories:
      - name: Light
